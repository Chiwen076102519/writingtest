        }
        .calligraphy-title {

        }
        /* Custom ink scrollbar */

            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1ebd9;
        }
        ::-webkit-scrollbar-thumb {
            background: #5c5240;
            border-radius: 3px;
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        /* Brush stroke border effect */
        .brush-border {
            border: 12px solid transparent;
            border-image: radial-gradient(circle at center, #2e261f 70%, transparent 100%) 12;
        }
    </style>
    <script>
        // STRICT HEAD GUARDRAIL: Pre-declare fallback image load function to avoid ReferenceError

            imgElement.style.display = 'none';
            const fallbackScroll = document.getElementById('art-failsafe-scroll');
            if (fallbackScroll) {
                fallbackScroll.classList.remove('hidden');
                fallbackScroll.classList.add('flex');
            }

        const artworksDb = [];
        const YEAR_LIST = ['丙午年 夏月', '乙巳年 暮春', '甲辰年 深秋', '癸卯年 冬月'];

        function generateArtworksDb() {
            for (let id = 1; id <= 82; id++) {
                if (CUSTOM_ARTWORKS[id]) {
                    // Match provided physical paintings
                    artworksDb.push({
                        id: id,
                        title: CUSTOM_ARTWORKS[id].title,
                        desc: CUSTOM_ARTWORKS[id].desc,
                        image: CUSTOM_ARTWORKS[id].image,
                        year: '丙午年 夏月',
                        stampId: getChineseNumeral(id)
                    });
                } else {
                    // Generate elegant default placeholder parameters (so the database remains complete 1-82)
                    artworksDb.push({
                        id: id,
                        title: `筆墨心跡 — 雅品其${getChineseNumeral(id)}`,
                        desc: `【作品編號 ${id}】 本作以傳統書體揮灑，線條自然跌宕，筆墨濃淡相宜。旨在透過純粹的書藝墨痕，展現藝術家靜觀自得、澄懷觀道的墨緣精神與生活雅興。`,
                        image: `art${id}.jpg`,
                        year: YEAR_LIST[id % YEAR_LIST.length],
                        stampId: getChineseNumeral(id)
                    });
                }
            }
        }

        // Convert number to Chinese Classical Stamp ID
        function getChineseNumeral(num) {
            const chars = ["零", "壹", "貳", "參", "肆", "伍", "陸", "柒", "捌", "玖", "拾"];
            if (num <= 10) return chars[num];
            if (num < 20) return "拾" + (num % 10 !== 0 ? chars[num % 10] : "");
            const tens = Math.floor(num / 10);
            const ones = num % 10;
            return chars[tens] + "拾" + (ones !== 0 ? chars[ones] : "");
        }

        // --- GLOBAL STATE ---
        let selectedArtId = 25; // Default starts selected at No. 25
        let searchQuery = '';

        // DOM Elements
        let gridContainer, countIndicator, searchInput, homepageView, detailView;
        let artPhoto, artFailsafeScroll, failsafeTitle, failsafeDesc;
        let artTitle, artStampId, artYear, artIdBadge;

        window.addEventListener('DOMContentLoaded', () => {
            // Bind DOM Elements
            gridContainer = document.getElementById('numbers-grid');
            countIndicator = document.getElementById('filtered-count');
            searchInput = document.getElementById('num-search');
            homepageView = document.getElementById('homepage-view');
            detailView = document.getElementById('detail-view');

            artPhoto = document.getElementById('art-photo');
            artFailsafeScroll = document.getElementById('art-failsafe-scroll');
            failsafeTitle = document.getElementById('failsafe-title');
            failsafeDesc = document.getElementById('failsafe-desc');

            artTitle = document.getElementById('art-title');
            artStampId = document.getElementById('art-stamp-id');
            artYear = document.getElementById('art-year');
            artIdBadge = document.getElementById('art-id-badge');

            // Initialize Icons & Databases
            lucide.createIcons();
            generateArtworksDb();
            renderNumbersGrid();
            
            // Search box listener
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderNumbersGrid();
            });

            // Set default view but keep homepage visible
            loadArtworkData(25);
        });

        function renderNumbersGrid() {
            gridContainer.innerHTML = '';
            
            let filtered = artworksDb.filter(art => {
                return searchQuery === '' || art.id === parseInt(searchQuery);
            });

            countIndicator.innerText = `顯示中: ${filtered.length} / 82`;

            filtered.forEach(art => {
                const btn = document.createElement('button');
                btn.className = getNumberBtnClass(art.id);
                btn.innerHTML = `
                    <span class="text-xs font-bold block">${art.id}</span>
                    <span class="text-[9px] opacity-75 block whitespace-nowrap overflow-hidden text-ellipsis px-1">${art.title.replace('筆墨心跡 — ', '')}</span>
                `;
                btn.onclick = () => selectArtwork(art.id);
                gridContainer.appendChild(btn);
            });

            if (filtered.length === 0) {
                gridContainer.innerHTML = `
                    <div class="col-span-full py-12 text-center text-stone-400 text-xs">
                        未尋獲此編號之書法作品
                    </div>
                `;
            }
        }

        function getNumberBtnClass(id) {
            const isSelected = id === selectedArtId;
            if (isSelected) {
                return 'aspect-square flex flex-col items-center justify-center border-2 border-amber-800 bg-amber-50 text-amber-900 rounded-md transition-all duration-200 shadow-md ring-2 ring-amber-800/10 transform scale-105';
            }
            return 'aspect-square flex flex-col items-center justify-center border border-amber-200/60 bg-[#fcf8ed] text-amber-900 hover:bg-amber-100/60 text-center rounded transition-all duration-150 shadow-sm';
        }

        function selectArtwork(id) {
            loadArtworkData(id);
            
            // 1. Hide the Homepage View
            homepageView.classList.add('hidden');
            
            // 2. Show the Sub-Page View
            detailView.classList.remove('hidden');
            detailView.classList.add('flex');
            
            // Smooth scroll to top of page
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToHome() {
            // 1. Hide Detail View
            detailView.classList.add('hidden');
            detailView.classList.remove('flex');
            
            // 2. Show Homepage Grid
            homepageView.classList.remove('hidden');
            
            // Clear any single search query so the user returns to the full directory
            searchInput.value = '';
            searchQuery = '';
            renderNumbersGrid();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadArtworkData(id) {
            selectedArtId = id;
            const art = artworksDb.find(a => a.id === id);
            if (!art) return;

            // Clear previous display states
            artPhoto.classList.remove('opacity-0');
            artPhoto.style.display = 'block';
            artFailsafeScroll.classList.add('hidden');
            artFailsafeScroll.classList.remove('flex');

            // Set images and descriptions
            artPhoto.src = art.image;
            
            artTitle.innerText = art.title;
            artStampId.innerText = art.stampId;
            artYear.innerText = art.year;
            artIdBadge.innerText = art.id;

            // Pre-set text fallbacks inside the failsafe container (used only when image load fails)
            failsafeTitle.innerText = art.title;
            failsafeDesc.innerText = art.desc;
        }
    </script>
