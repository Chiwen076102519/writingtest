    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f7f4eb; /* 宣紙微黃 */
            background-image: radial-gradient(#efece3 1px, transparent 1px), radial-gradient(#efece3 1px, #f7f4eb 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        .calligraphy-title {
            font-family: 'Ma Shan Zheng', cursive, 'Noto Serif TC';
        }
        /* 定製優雅的墨香滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1ebd9;
        }
        ::-webkit-scrollbar-thumb {
            background: #5c5240;
            border-radius: 3px;
        }
        /* 墨跡暈染淡入動畫 */
        @keyframes inkWash {
            0% { filter: blur(8px); opacity: 0; transform: scale(0.97); }
            100% { filter: blur(0px); opacity: 1; transform: scale(1); }
        }
        .ink-animate {
            animation: inkWash 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* 畫框雙線包邊設計 */
        .brush-border {
            border: 4px double #5c5240;
        }
    </style>

        const CATEGORIES = {
            calligraphy: '書法作品'
        };

        const artworksDb = [];

        function generateArtworksDb() {
            for (let id = 1; id <= 82; id++) {
                if (customArtworksData[id]) {
                    const custom = customArtworksData[id];
                    artworksDb.push({
                        id: id,
                        title: custom.title,
                        category: CATEGORIES.calligraphy,
                        categoryKey: 'calligraphy',
                        year: '丙午年夏月',
                        desc: custom.desc,
                        stampId: getChineseNumeral(id),
                        isRealImage: true,
                        imageSrc: custom.imageSrc
                    });
                } else {
                    // Generically elegant placeholder fallback for remaining elements
                    const fallbackTitles = [
                        '修德養心', '靜觀自得', '清風明月', '高山流水', '松風竹韻', 
                        '大智若愚', '寧靜致遠', '返璞歸真', '虛懷若谷', '厚德載物'
                    ];
                    const chosenTitle = fallbackTitles[id % fallbackTitles.length];
                    artworksDb.push({
                        id: id,
                        title: `筆墨心跡 — ${chosenTitle} (${id})`,
                        category: CATEGORIES.calligraphy,
                        categoryKey: 'calligraphy',
                        year: '丙午年夏月',
                        desc: `【編號 ${id}】此作為古典行書筆法之練習創作，筆力遒勁，融會貫通。用筆提按頓挫分明，線條豐滿而富張力，盡展傳統書法藝術之深沉魅力。`,
                        stampId: getChineseNumeral(id),
                        isRealImage: false,
                        imageSrc: ''
                    });
                }
            }
        }

        // Convert Arabic Number to Chinese Numerical values
        function getChineseNumeral(num) {
            const chars = ["零", "壹", "貳", "參", "肆", "伍", "陸", "柒", "捌", "玖", "拾"];
            if (num <= 10) return chars[num];
            if (num < 20) return "拾" + (num % 10 !== 0 ? chars[num % 10] : "");
            const tens = Math.floor(num / 10);
            const ones = num % 10;
            return chars[tens] + "拾" + (ones !== 0 ? chars[ones] : "");
        }

        // --- GLOBAL SYSTEM STATE ---
        let selectedArtId = 25; // Default launch selection

        // --- DOM ELEMENTS BINDING ---
        const gridContainer = document.getElementById('numbers-grid');

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            generateArtworksDb();
            renderNumbersGrid();
            // Start default selected artwork silently without scrolling
            selectArtwork(25);
            // Ensure first view is showing home
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('details-view').classList.add('hidden');
        });

        // Grid Rendering
        function renderNumbersGrid() {
            gridContainer.innerHTML = '';
            
            artworksDb.forEach(art => {
                const btn = document.createElement('button');
                btn.className = getNumberBtnClass(art);
                btn.innerHTML = `
                    <span class="text-sm font-bold block">${art.id}</span>
                    <span class="text-[9px] opacity-75 block whitespace-nowrap overflow-hidden text-ellipsis px-0.5">${art.title.split(' — ')[1] || art.title}</span>
                `;
                btn.onclick = () => selectArtwork(art.id);
                gridContainer.appendChild(btn);
            });
        }

        function getNumberBtnClass(art) {
            // Uniformly beautiful warm amber-themed keys for Calligraphy feel
            const isSelected = art.id === selectedArtId;
            if (isSelected) {
                return 'aspect-square flex flex-col items-center justify-center border-2 border-amber-800 bg-amber-100 text-stone-900 rounded-md transition-all duration-200 shadow-md ring-2 ring-amber-800/10 transform scale-105';
            }
            return 'aspect-square flex flex-col items-center justify-center border border-amber-200/60 bg-[#fdfbf6] text-stone-800 text-center rounded hover:bg-amber-50/50 hover:border-amber-300 transition-all duration-150 shadow-sm';
        }

        // Core Selection Handler (Toggles viewports smoothly)
        function selectArtwork(id) {
            selectedArtId = id;
            const art = artworksDb.find(a => a.id === id);
            if (!art) return;

            // Update details view panel texts
            document.getElementById('art-canvas-id').innerText = art.id;
            document.getElementById('art-title').innerText = art.title;
            document.getElementById('art-stamp-id').innerText = art.stampId;
            document.getElementById('art-year').innerText = art.year;
            document.getElementById('art-desc').innerText = art.desc;

            const img = document.getElementById('art-image');
            const fallback = document.getElementById('art-fallback-container');
            const verticalText = document.getElementById('fallback-vertical-text');

            // Hide main image, show fallback parchment layer first while loading
            img.classList.add('hidden');
            fallback.classList.remove('hidden');

            // Render first 55 characters vertically on fallback parchment scroll
            verticalText.innerText = art.desc.substring(0, 55) + "...";

            if (art.isRealImage && art.imageSrc) {
                // If the item specifies a real image, load it cleanly
                img.src = art.imageSrc;
                img.onload = function() {
                    img.classList.remove('hidden');
                    fallback.classList.add('hidden');
                };
                img.onerror = function() {
                    // Fallback to vertical parchment scroll on loading error (offline / missing image)
                    img.classList.add('hidden');
                    fallback.classList.remove('hidden');
                };
            } else {
                img.classList.add('hidden');
                fallback.classList.remove('hidden');
            }

            // Hide Home View list, show Details view page
            document.getElementById('home-view').classList.add('hidden');
            const detailsView = document.getElementById('details-view');
            detailsView.classList.remove('hidden');

            // Trigger ink淡入 Animation
            detailsView.classList.remove('ink-animate');
            void detailsView.offsetWidth; // Trigger reflow
            detailsView.classList.add('ink-animate');

            // Smooth scroll to details view on narrow devices
            detailsView.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Return Home view and reset
        function returnToHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('details-view').classList.add('hidden');
            
            // Re-render buttons in case we want to update selected status
            renderNumbersGrid();

            // Smooth scroll back to top of document
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Global fallback function bound explicitly to prevent any mobile load errors
        window.handleImageLoadError = function(imgElement) {
            imgElement.classList.add('hidden');
            const fallback = document.getElementById('art-fallback-container');
            if (fallback) fallback.classList.remove('hidden');
        };
    </script>
